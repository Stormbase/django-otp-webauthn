[tox]
requires =
    tox>=4.18.1
env_list =
    py{314, 313, 312}-django61
    py{314, 313, 312}-django60
    py{314, 313, 312, 311, 310}-django52
skip_missing_interpreters = true

[testenv]
description = Run tests against {base_python} / {env_name}
base_python =
    py310: python3.10
    py311: python3.11
    py312: python3.12
    py313: python3.13
    py314: python3.14
    py315: python3.15
deps =
    django52: django~=5.2.0
    django60: django~=6.0.0
    django61: django~=6.1.0a1
extras =
    testing
set_env =
    PYTHONWARNINGS = always::DeprecationWarning
commands =
    python -Wall -m coverage run -pm pytest {posargs}

[testenv:future]
description = Track Django main + py_webauthn main
base_python = python3.15
deps =
    future: https://github.com/django/django/archive/refs/heads/main.zip
    future: https://github.com/duo-labs/py_webauthn/archive/refs/heads/master.zip
extras =
    testing
commands =
    python -Wall -m coverage run -pm pytest {posargs}
