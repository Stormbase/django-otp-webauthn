[tox]
requires =
    tox>=4.18.1
env_list =
    py{310,311,312,313,314}-django52
    py{312,313,314}-django60
    py{312,313,314}-django61
minversion = 4.18.1

[testenv]
base_python =
    py310: python3.10
    py311: python3.11
    py312: python3.12
    py313: python3.13
    py314: python3.14
    py315: python3.15

deps =
    django52: django~=5.2.0
    django60: django~=6.0.0
    django61: django~=6.1.0a1

[testenv:future]
env =
    PYTHONWARNINGS=always::DeprecationWarning
commands = python -Wall -m coverage run -pm pytest
extras = testing
basepython = python3.15
deps =
    https: //github.com/django/django/archive/refs/heads/main.zip
    https: //github.com/duo-labs/py_webauthn/archive/refs/heads/master.zip
extras =
    testing
commands =
    python -Wall -m coverage run -pm pytest
env =
    PYTHONWARNINGS=always::DeprecationWarning
