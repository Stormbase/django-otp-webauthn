name: Documentation

on:
  push:
    paths:
      - "docs/**" # Only trigger when files in docs folder change
    branches:
      - "**"
  pull_request:
    paths:
      - "docs/**" # Only trigger when files in docs folder change
    branches:
      - "**"

permissions:
  contents: read

# Can only be active once per branch
concurrency:
  group: "build-docs-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install -e '.[docs]'

      - name: Build Documentation
        working-directory: ./docs
        run: |
          make html

      - name: Upload documentation artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: django-otp-webauthn-docs
          path: docs/_build/html/
          retention-days: 7
  spellcheck:
    name: Spell Check Documentation
    runs-on: ubuntu-latest
    needs: build-docs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"
          cache: "pip"
      - uses: gerlero/apt-install@f4fa5265092af9e750549565d28c99aec7189639 # v1.3.11
        name: Install aspell
        with:
          packages: aspell aspell-en
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          python -m pip install pyspelling
      - name: Download documentation artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: django-otp-webauthn-docs
          path: docs/_build/html/
          run-id: ${{ github.run_id }}

      - name: Run spell check
        working-directory: ./docs
        run: |
          python -m pyspelling -c spellingcheck.yaml
