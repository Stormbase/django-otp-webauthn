name: Publish to Test PyPI
on:
  release:
    # https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#release
    types: [prereleased]

permissions:
  contents: read

concurrency:
  group: "publish-${{ github.ref }}"
  cancel-in-progress: false # Don't cancel in-progress publish jobs, they may be in the middle of uploading to PyPI!

jobs:
  # Before a release, run the test suite
  test:
    uses: ./.github/workflows/test.yml

  build:
    name: Build package distributions
    needs: ["test"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          package-manager-cache: false # No cache to avoid cache poisoning attacks

      - name: Install Node dependencies
        run: |
          yarn install --frozen-lockfile

      - name: Compile JavaScript
        run: |
          yarn build

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"

      - name: Install additional system packages
        run: |
          sudo apt-get update -y
          # Need `gettext` to compile translations
          sudo apt-get install gettext

      - name: Install Python dependencies
        run: pip install .[testing] build hatchling

      - name: Compile translations
        run: |
          /bin/sh ./scripts/compile_translations.sh

      - name: Build package distributions
        run: python -m build

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: dist
          path: ./dist

  # https://docs.pypi.org/trusted-publishers/using-a-publisher/
  pypi-publish:
    needs: ["build"]
    environment: "pypi"

    name: Upload release to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Mandatory for trusted publishing
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: dist
          path: ./dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: ./dist
          repository-url: https://test.pypi.org/legacy/
