name: Playwright Tests
on:
  workflow_call:
  workflow_dispatch:

env:
  FORCE_COLOR: "1" # Make tools pretty.
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

# Only allow a single run to be active on this branch
concurrency:
  group: "playwright-tests-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  playwright:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
          cache: "pip"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
      - uses: gerlero/apt-install@f4fa5265092af9e750549565d28c99aec7189639 # v1.3.11
        name: Install gettext
        with:
          packages: gettext
      - name: Install frontend dependencies
        run: |
          yarn install --frozen-lockfile
      - name: Compile JavaScript
        run: |
          yarn build
      - name: Install backend dependencies
        run: |
          python -m pip install .[testing,playwright]
      - name: Compile translations
        run: /bin/sh ./scripts/compile_translations.sh
      - name: Run E2E tests
        run: |
          /bin/sh ./scripts/run_e2e_testsuite.sh
      - name: Upload Playwright traces
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 3
