name: Publish to PyPI
on:
  release:
    # https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#release
    types: [released]

concurrency:
  group: "publish-${{ github.ref }}"
  cancel-in-progress: false # Don't cancel in-progress publish jobs, they may be in the middle of uploading to PyPI!
env:
  PYTHONNOUSERSITE: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

permissions: {}

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/django-otp-webauthn/
    permissions:
      contents: read # Needed to download release artifacts
      id-token: write # Needed for Trusted Publishing to PyPI
    steps:
      - name: Download release artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          mkdir dist
          gh release download "$TAG" \
          --repo "$GITHUB_REPOSITORY" \
          --dir dist \
          --pattern "*.whl" \
          --pattern "*.tar.gz" \
          --pattern "sha256sums.txt"

      - name: Verify checksums
        run: |
          mv dist/sha256sums.txt sha256sums.txt
          sha256sum --check sha256sums.txt

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: ./dist
