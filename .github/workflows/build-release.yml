name: Prepare release
on:
  push:
    tags:
      - "*" # Any tag will trigger

concurrency:
  group: "publish-build-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHONNOUSERSITE: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  # As part of the build, run the test suite
  test:
    name: Run tests
    uses: ./.github/workflows/test.yml
  build-js:
    name: Build JavaScript assets
    runs-on: ubuntu-latest
    permissions:
      contents: read # Need to checkout source code to compile message catalogs
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: ".nvmrc"
          package-manager-cache: false # No cache to avoid cache poisoning attacks

      - name: Install Node dependencies
        run: |
          yarn install --frozen-lockfile --no-scripts

      - name: Compile JavaScript
        run: |
          yarn build

      - name: Upload static assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: static-assets
          path: src/django_otp_webauthn/static/django_otp_webauthn/
          if-no-files-found: error

  compile-message-catalogs:
    name: Compile message catalogs
    runs-on: ubuntu-latest
    permissions:
      contents: read # Need to checkout source code to compile message catalogs
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.x"

      - name: Install additional system packages
        run: |
          sudo apt-get update -y
          # Need `gettext` to compile translations
          sudo apt-get install gettext

      - name: Install Python dependencies
        run: pip install .[testing] build hatchling

      - name: Compile translations
        run: |
          /bin/sh ./scripts/compile_translations.sh

      - name: Upload compiled message catalogs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: compiled-message-catalogs
          if-no-files-found: error
          # Save compiled message catalogs to the same relative path so they can
          # be easily merged back into the source tree in the next job
          path: |
            ./src/django_otp_webauthn/**/*.mo
            ./sandbox/**/*.mo
  build:
    needs: ["build-js", "compile-message-catalogs"]
    name: Build package distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.x"

      - name: Download compiled message catalogs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: compiled-message-catalogs
          # Download to the same relative path so they can be easily merged back into the source tree

      - name: Download static assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: static-assets
          path: src/django_otp_webauthn/static/django_otp_webauthn/

      - name: Build package distributions
        run: |
          python -m pip install build hatchling
          python -m build

      - name: Create SHA256 checksums for the distribution files
        run: |
          sha256sum dist/*.tar.gz dist/*.whl > dist/sha256sums.txt

      - name: Extract release notes section from changelog
        env:
          # Get tag from push event, for example "v0.9.0"
          TAG: ${{ github.ref_name }}
        run: |
          python .github/extract_changelog.py $TAG > RELEASE_NOTES.md
      - name: Upload distribution files and release notes
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets
          path: |
            dist/*.tar.gz
            dist/*.whl
            dist/sha256sums.txt
            RELEASE_NOTES.md
          if-no-files-found: error

  check-release:
    needs: ["build"]
    name: Check release artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read # Need to download release artifacts
    steps:
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.x"

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets

      - name: Verify checksums
        run: |
          # Move the checksum file to the parent directory - twine does not like it
          mv dist/sha256sums.txt sha256sums.txt
          sha256sum --check --strict sha256sums.txt
      - name: Run twine check
        run: |
          python -m pip install twine
          python -m twine check dist/*
      - name: Install the wheel in a virtual environment and run smoke test
        run: |
          python -m venv venv
          . venv/bin/activate
          python -m pip install dist/*.whl
          python -c "import django_otp_webauthn; print(django_otp_webauthn.__version__)"

  prepare-release:
    needs: ["test", "check-release"]
    name: Prepare GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Need to create/update release and upload assets
      id-token: write # Need to sign artifacts with Sigstore
    steps:
      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets
      - name: Create GitHub Release ${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Release $TAG does not exist. Creating a new draft release."
            gh release create -d -t "$TAG" "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file RELEASE_NOTES.md
            exit 0
          else
            echo "Release $TAG already exists. Checking if it's a draft to determine if it can be deleted."
            gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq '.isDraft' | grep true || (echo "Release $TAG is not a draft and cannot be deleted." && exit 1)
            echo "Release $TAG is a draft and can be deleted."
            gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes
            echo "Creating a new draft release $TAG."
            gh release create -d -t "$TAG" "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file RELEASE_NOTES.md
            exit 0
          fi

      - name: Remove previous release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release delete-asset "$TAG" sha256sums.txt --repo "$GITHUB_REPOSITORY" --yes || true
          for asset in $(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name'); do
            gh release delete-asset "$TAG" "$asset" --repo "$GITHUB_REPOSITORY" --yes || true
          done

      - name: Sign artifacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@5b79a39c381910c090341a2c9b0bf022c8b387e1 # v3.4.0
        with:
          inputs: |
            dist/*.whl
            dist/*.tar.gz

      - name: Publish release assets to GitHub Release ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release upload "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" dist/*.whl dist/*.tar.gz dist/*.sigstore.json dist/sha256sums.txt --clobber
