name: GitHub Actions Security Analysis with zizmor 🌈

on:
  push:
    branches: ["main"]
    paths:
      - ".github/**" # only trigger when GitHub Actions workflow files or related configuration files change
  pull_request:
    branches: ["**"]
    paths:
      - ".github/**" # only trigger when GitHub Actions workflow files or related configuration files change
permissions: {}

concurrency:
  group: "zizmor-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  zizmor:
    name: Zizmor 🌈 Security Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # Required to upload security analysis results
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run zizmor 🌈
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          persona: "pedantic"
