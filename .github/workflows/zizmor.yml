name: GitHub Actions Security Analysis with zizmor 🌈

on:
  push:
    branches: ["main"]
    paths:
      - ".github/**" # only trigger when GitHub Actions workflow files or related configuration files change
  pull_request:
    branches: ["**"]
    paths:
      - ".github/**" # only trigger when GitHub Actions workflow files or related configuration files change
permissions: {}

concurrency:
  group: "zizmor-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  zizmor:
    name: Zizmor 🌈 Security Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # Required to upload security analysis results
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Run zizmor 🌈
        uses: zizmorcore/zizmor-action@6fc4b006235f201fdab3722e17240ab420d580e5 # v0.6.1
        with:
          persona: "pedantic"
